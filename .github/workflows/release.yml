name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --all
      - name: Verify release build
        run: cargo build --release

  goreleaser:
    name: Publish binaries and Homebrew
    needs: verify
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: goto-bus-stop/setup-zig@v2
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked --version 0.22.1
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: goreleaser-dist
          path: dist/**
          if-no-files-found: error

  wheels:
    name: Build wheels (${{ matrix.name }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - name: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.12.6
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --compatibility pypi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish wheels
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  npm:
    name: Publish npm packages
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@v5
        with:
          name: goreleaser-dist
          path: dist
      - name: Prepare platform packages from dist
        run: node scripts/prepare-npm-packages.js dist --dist-dir dist
      - name: Publish platform packages if missing
        run: |
          publish_if_missing() {
            name="$1"
            version="$2"
            shift 2
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}; already published"
            else
              npm publish "$@" --access public --provenance
            fi
          }
          VERSION="$(node -p "require('./package.json').version")"
          publish_if_missing graveyard-cli-darwin-arm64 "$VERSION" --workspace npm/graveyard-darwin-arm64
          publish_if_missing graveyard-cli-darwin-x64 "$VERSION" --workspace npm/graveyard-darwin-x64
          publish_if_missing graveyard-cli-linux-arm64 "$VERSION" --workspace npm/graveyard-linux-arm64
          publish_if_missing graveyard-cli-linux-x64 "$VERSION" --workspace npm/graveyard-linux-x64
          publish_if_missing graveyard-cli-windows-x64 "$VERSION" --workspace npm/graveyard-windows-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
      - name: Publish root wrapper if missing
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "graveyard-cli@${VERSION}" version >/dev/null 2>&1; then
            echo "Skipping graveyard-cli@${VERSION}; already published"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

  cargo:
    name: Publish crate
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io if missing
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('Cargo.toml').read_text(encoding='utf-8'))
          print(data['package']['version'])
          PY
          )"
          if python - <<'PY'
          import json
          import tomllib
          import urllib.request
          from pathlib import Path

          version = tomllib.loads(Path('Cargo.toml').read_text(encoding='utf-8'))['package']['version']
          with urllib.request.urlopen('https://crates.io/api/v1/crates/graveyard', timeout=30) as response:
              payload = json.load(response)
          raise SystemExit(0 if any(item['num'] == version for item in payload['versions']) else 1)
          PY
          then
            echo "Skipping graveyard ${VERSION}; already published"
          else
            cargo publish --locked
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  smoke-install:
    name: Install smoke (${{ matrix.channel }})
    needs:
      - cargo
      - publish-pypi
      - npm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel:
          - cargo
          - pypi
          - npm
    steps:
      - uses: actions/checkout@v5
      - name: Read release version
        id: version
        shell: bash
        run: |
          echo "value=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('Cargo.toml').read_text(encoding='utf-8'))
          print(data['package']['version'])
          PY
          )" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.channel == 'cargo'
      - uses: actions/setup-python@v6
        if: matrix.channel == 'pypi'
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        if: matrix.channel == 'npm'
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Smoke test crates.io install
        if: matrix.channel == 'cargo'
        shell: bash
        run: |
          cargo install graveyard --version "${{ steps.version.outputs.value }}" --locked --force
          graveyard --version | grep "${{ steps.version.outputs.value }}"
      - name: Smoke test PyPI install
        if: matrix.channel == 'pypi'
        shell: bash
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "graveyard==${{ steps.version.outputs.value }}"
          graveyard --version | grep "${{ steps.version.outputs.value }}"
      - name: Smoke test npm install
        if: matrix.channel == 'npm'
        shell: bash
        run: |
          npm install -g "graveyard-cli@${{ steps.version.outputs.value }}"
          graveyard --version | grep "${{ steps.version.outputs.value }}"
