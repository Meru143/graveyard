version: 2

project_name: graveyard

before:
  hooks:
    - cargo fetch --locked

builds:
  - id: graveyard-core
    builder: rust
    binary: graveyard
    command: zigbuild
    tool: cargo
    flags:
      - --release
      - --locked
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-pc-windows-gnu
  - id: graveyard-darwin
    builder: rust
    binary: graveyard
    command: zigbuild
    tool: cargo
    flags:
      - --release
      - --locked
    skip: '{{ and .IsSnapshot (ne .Runtime.Goos "darwin") }}'
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin

archives:
  - id: graveyard
    ids:
      - graveyard-core
      - graveyard-darwin
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git

brews:
  - name: graveyard
    ids:
      - graveyard-core
      - graveyard-darwin
    repository:
      owner: Meru143
      name: homebrew-tap
    homepage: "https://github.com/Meru143/graveyard"
    description: "Find dead code across Python, JS/TS, Go, and Rust with git-aware confidence scoring."
    license: "MIT"
    test: |
      system "#{bin}/graveyard", "--version"
    install: |
      bin.install "graveyard"
