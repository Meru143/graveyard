version: 2

project_name: graveyard

before:
  hooks:
    - cargo fetch --locked

builds:
  - id: graveyard
    builder: rust
    binary: graveyard
    command: zigbuild
    tool: cargo
    flags:
      - --release
      - --locked
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-apple-darwin
      - aarch64-apple-darwin
      - x86_64-pc-windows-gnu

archives:
  - id: graveyard
    ids:
      - graveyard
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git

brews:
  - name: graveyard
    ids:
      - graveyard
    repository:
      owner: you
      name: homebrew-tap
    homepage: "https://github.com/you/graveyard"
    description: "Scan polyglot repositories for dead code and rank findings with git-history-weighted confidence."
    license: "MIT"
    test: |
      system "#{bin}/graveyard", "--version"
    install: |
      bin.install "graveyard"
