[graph]
all-features = true

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib"
]

[advisories]
version = 2
ignore = [
  "RUSTSEC-2024-0384",
  "RUSTSEC-2025-0057"
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
